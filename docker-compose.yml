version: '3.7'

services:
  fusionauth:
    image: fusionauth/fusionauth-app:latest
    depends_on:
      fusionauth-db:
        condition: service_healthy
      fusionauth-search:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://fusionauth-db:5432/fusionauth
      DATABASE_ROOT_USERNAME: ${FUSIONAUTH_DATABASE_ROOT_USERNAME}
      DATABASE_ROOT_PASSWORD: ${FUSIONAUTH_DATABASE_ROOT_PASSWORD}
      DATABASE_USERNAME: ${FUSIONAUTH_DATABASE_USERNAME}
      DATABASE_PASSWORD: ${FUSIONAUTH_DATABASE_PASSWORD}
      FUSIONAUTH_APP_MEMORY: ${FUSIONAUTH_APP_MEMORY}
      FUSIONAUTH_APP_RUNTIME_MODE: ${FUSIONAUTH_APP_RUNTIME_MODE}
      FUSIONAUTH_APP_URL: ${FUSIONAUTH_APP_URL}
      SEARCH_SERVERS: http://fusionauth-search:9200
      SEARCH_TYPE: elasticsearch
    networks:
      - fusionauth_db_net
      - fusionauth_search_net
    restart: unless-stopped
    ports:
      - 9011:9011
    volumes:
      - fusionauth_config:/usr/local/fusionauth/config

  fusionauth-db:
    image: postgres:16-bookworm
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_USER: ${FUSIONAUTH_DATABASE_ROOT_USERNAME}
      POSTGRES_PASSWORD: ${FUSIONAUTH_DATABASE_ROOT_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fusionauth_db_net
    restart: unless-stopped
    volumes:
      - fusionauth_db_data:/var/lib/postgresql/data

  fusionauth-search:
    image: opensearchproject/opensearch:2.11.0
    environment:
      cluster.name: fusionauth
      discovery.type: single-node
      node.name: search
      plugins.security.disabled: true
      bootstrap.memory_lock: true
      OPENSEARCH_JAVA_OPTS: ${FUSIONAUTH_OPENSEARCH_JAVA_OPTS}
    healthcheck:
      interval: 10s
      retries: 80
      test: curl --write-out 'HTTP %{http_code}' --fail --silent --output /dev/null http://fusionauth-search:9200
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - 9200:9200 # REST API
      - 9600:9600 # Performance Analyzer
    volumes:
      - fusionauth_search_data:/usr/share/elasticsearch/data
    networks:
      - fusionauth_search_net

networks:
  fusionauth_db_net:
    driver: bridge
  fusionauth_search_net:
    driver: bridge

volumes:
  fusionauth_config:
  fusionauth_db_data:
  fusionauth_search_data:
