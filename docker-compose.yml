version: '3.7'

services:
  keycloak_db:
    container_name: keycloak_db
    image: bitnami/postgresql:latest
    environment:
      ALLOW_EMPTY_PASSWORD: yes
      POSTGRESQL_USERNAME: keycloak
      POSTGRESQL_DATABASE: keycloak
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bn_keycloak']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dungeon_delvers
    volumes:
      - keycloak_db_data:/bitnami/postgresql

  keycloak:
    container_name: keycloak
    image: bitnami/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_CREATE_ADMIN_USER: true
      KEYCLOAK_ENABLE_HEALTH_ENDPOINTS: true
      KEYCLOAK_DATABASE_HOST: keycloak_db
      KEYCLOAK_DATABASE_USER: keycloak
      KEYCLOAK_DATABASE_NAME: keycloak
    depends_on:
      keycloak_db:
        condition: service_healthy
    ports:
      - 5000:8080
    networks:
      - dungeon_delvers
    volumes:
      - keycloak_data:/docker-entrypoint-initdb.d

  kafka:
    container_name: kafka
    image: bitnami/kafka:latest
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    ports:
      - 9092:9092
    networks:
      - dungeon_delvers

  character_management_db:
    container_name: character_management_db
    image: bitnami/postgresql:latest
    environment:
      ALLOW_EMPTY_PASSWORD: yes
      POSTGRESQL_USERNAME: character_management
      POSTGRESQL_DATABASE: character_management
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U character_management']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dungeon_delvers
    volumes:
      - character_management_db_data:/bitnami/postgresql

  character_management:
    container_name: character_management
    build:
      context: ./src/services/CharacterManagement
      dockerfile: ./Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
    depends_on:
      character_management_db:
        condition: service_healthy
    ports:
      - 8080:80
    networks:
      - dungeon_delvers

networks:
  dungeon_delvers:
    driver: bridge

volumes:
  keycloak_data:
  keycloak_db_data:
  character_management_db_data:
