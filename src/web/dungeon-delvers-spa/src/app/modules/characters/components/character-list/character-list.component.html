<div>
  <h1>Characters</h1>
  <app-card
    *ngFor="let character of characters"
    class="divide-y divide-gray-200"
  >
    <app-description-list-item>
      <p label>Name</p>
      <p>{{ character.name }}</p>
    </app-description-list-item>
    <app-description-list-item>
      <p label>Race</p>
      <p>{{ character.race }}</p>
    </app-description-list-item>
    <app-description-list-item>
      <p label>Size</p>
      <p>{{ character.size }}</p>
    </app-description-list-item>
    <app-description-list-item>
      <p label>Type</p>
      <p>{{ character.creatureType }}</p>
    </app-description-list-item>
    <app-description-list-item>
      <p label>Speed</p>
      <p>{{ character.movementSpeed }}ft.</p>
    </app-description-list-item>
  </app-card>
  <ul role="list" class="divide-y divide-gray-100">
    <li
      *ngFor="let character of characters"
      class="flex justify-between gap-x-6 py-4"
    >
      <div class="flex min-w-0 gap-x-4">
        <img
          class="h-12 w-12 flex-none rounded-full bg-gray-50"
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
          alt=""
        />
        <div class="min-w-0 flex-auto">
          <p class="text-sm font-semibold leading-6 text-gray-900">
            {{ character.name }}
          </p>
          <p class="my-1 truncate text-xs leading-6 text-gray-500">
            Level 1 {{ character.race }}
          </p>
        </div>
      </div>
      <div class="hidden shrink-0 sm:flex sm:flex-col sm:items-end">
        <p class="text-sm leading-6 text-gray-900">
          {{ character.size }}
        </p>
        <p class="my-1 text-xs leading-6 text-gray-500">
          {{ character.movementSpeed }}ft.
        </p>
      </div>
    </li>
  </ul>
</div>
