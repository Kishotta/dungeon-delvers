<h1>{{ race?.name }}</h1>
<mat-card>
  <cdk-accordion multi="true" class="example-accordion">
    @for (trait of race?.traits; track trait; let index = $index) {
    <cdk-accordion-item
      #accordionItem="cdkAccordionItem"
      class="example-accordion-item"
      role="button"
      tabindex="0"
      [attr.id]="'accordion-header-' + index"
      [attr.aria-expanded]="accordionItem.expanded"
      [attr.aria-controls]="'accordion-body-' + index"
    >
      <mat-card-header
        class="example-accordion-item-header"
        (click)="accordionItem.toggle()"
      >
        <mat-card-title>
          {{ trait.name }}
        </mat-card-title>
        <span> Click to {{ accordionItem.expanded ? "close" : "open" }} </span>
      </mat-card-header>
      <mat-card-content class="example-accordion-item-description">
        <div
          class="example-accordion-item-body"
          role="region"
          [style.display]="accordionItem.expanded ? '' : 'none'"
          [attr.id]="'accordion-body-' + index"
          [attr.aria-labelledby]="'accordion-header-' + index"
        >
          {{ trait.description }}
        </div>
        <div
          cdkDropList
          class="effects-list"
          (cdkDropListDropped)="drop($event)"
        >
          <div class="effect-item" *ngFor="let effect of trait.effects" cdkDrag>
            {{ effect.name }}
          </div>
        </div>
      </mat-card-content>
    </cdk-accordion-item>
    <mat-divider></mat-divider>
    }
  </cdk-accordion>
</mat-card>
