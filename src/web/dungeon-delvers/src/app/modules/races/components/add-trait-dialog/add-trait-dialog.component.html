<h1 mat-dialog-title>Add New Trait</h1>
<mat-dialog-content>
  <mat-form-field appearance="fill">
    <mat-label>Trait Name</mat-label>
    <input matInput [(ngModel)]="data.name" name="traitName" />
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>Trait Description</mat-label>
    <textarea
      matInput
      [(ngModel)]="data.description"
      name="traitDescription"
    ></textarea>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button mat-raised-button [mat-dialog-close]="data" color="primary">
    Add
  </button></mat-dialog-actions
>
