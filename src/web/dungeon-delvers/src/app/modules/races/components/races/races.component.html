<mat-card>
  <mat-card-header>
    <mat-card-title>
      <span> Races </span>
    </mat-card-title>
    <button
      mat-raised-button
      color="primary"
      class="add-button"
      (click)="openCreateRaceDialog()"
    >
      Create New Race
    </button>
  </mat-card-header>
  <table mat-table class="full-width-table" matSort aria-label="Elements">
    <!-- Id Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
      <td mat-cell *matCellDef="let race">{{ race.id }}</td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let race">{{ race.name }}</td>
    </ng-container>

    <!-- Traits Column -->
    <ng-container matColumnDef="traits">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Traits</th>
      <td mat-cell *matCellDef="let race">{{ race.traits.length }}</td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let race">
        <button
          mat-icon-button
          (click)="viewDetails(race)"
          aria-label="View details"
        >
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
